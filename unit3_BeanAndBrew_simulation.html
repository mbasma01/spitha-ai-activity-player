<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyst Simulator: Bean & Brew</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .highlight-row { background-color: #fef2f2; animation: pulseRed 2s infinite; }
        @keyframes pulseRed { 0% { background-color: #fef2f2; } 50% { background-color: #fee2e2; } 100% { background-color: #fef2f2; } }
        
        /* Popup Animation */
        .popup-enter { animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .popup-exit { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes slideDown { 
            from { opacity: 0; transform: translateY(-10px) scale(0.95); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }
        @keyframes slideUp { 
            from { opacity: 1; transform: translateY(0) scale(1); } 
            to { opacity: 0; transform: translateY(-10px) scale(0.95); pointer-events: none; } 
        }

        .email-card { border-left: 4px solid #6366f1; }
    </style>
</head>
<body class="bg-slate-100 h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 p-4 shadow-sm z-10 flex justify-between items-center">
        <div class="flex items-center gap-3 text-slate-800 font-bold text-lg">
            <div class="bg-indigo-600 p-1.5 rounded text-white"><i data-lucide="coffee"></i></div>
            <span>Bean & Brew <span class="font-normal text-slate-400">| Analyst Workstation</span></span>
        </div>
        <div class="flex items-center gap-4 text-sm">
            <div class="flex items-center gap-2 px-3 py-1.5 bg-green-100 text-green-700 rounded-full font-medium">
                <span class="relative flex h-2 w-2">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                </span>
                System Online
            </div>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
        
        <!-- Sidebar: Task Control -->
        <aside class="w-[400px] bg-white border-r border-slate-200 flex flex-col shadow-xl z-20 relative">
            
            <!-- Context Header / Email Trigger -->
            <div class="px-6 py-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center z-10 relative">
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Communication Channel</h2>
                <button id="show-email-btn" onclick="showEmail()" class="text-xs font-bold text-indigo-600 hover:text-indigo-800 bg-indigo-50 hover:bg-indigo-100 px-3 py-1.5 rounded-full border border-indigo-200 flex items-center gap-2 transition-all hidden shadow-sm">
                    <i data-lucide="mail" class="w-3 h-3"></i> Show Briefing
                </button>
            </div>

            <!-- Floating Email Popup -->
            <div id="email-container" class="absolute top-16 left-4 right-4 z-50 bg-white p-4 rounded-xl shadow-2xl border border-slate-200 email-card hidden">
                <div class="flex justify-between items-start mb-3">
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-bold text-xs" id="sender-avatar">JD</div>
                        <div>
                            <p class="text-sm font-bold text-slate-800" id="email-sender">John Doe</p>
                            <p class="text-xs text-slate-500">To: Data Team</p>
                        </div>
                    </div>
                    <button onclick="hideEmail()" class="text-slate-400 hover:text-slate-600 p-1 rounded-full hover:bg-slate-100 transition-colors">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>
                <p class="text-sm text-slate-600 leading-relaxed bg-slate-50 p-3 rounded border border-slate-100" id="email-body">
                    Loading message...
                </p>
                <div class="mt-2 w-full bg-slate-100 h-1 rounded-full overflow-hidden">
                    <div class="bg-indigo-400 h-full w-full animate-[width_6s_linear_forwards] origin-left"></div>
                </div>
            </div>

            <!-- Action Area -->
            <div class="flex-1 p-6 overflow-y-auto bg-white">
                <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
                    <i data-lucide="tool" class="w-4 h-4 text-indigo-600"></i> Active Task
                </h3>
                
                <div id="controls-area" class="space-y-4">
                    <!-- Dynamic Controls Injected Here -->
                </div>

                <div id="feedback-msg" class="mt-4 p-3 rounded-lg text-sm hidden font-medium"></div>
            </div>

            <!-- Terminal / Log -->
            <div class="bg-slate-900 p-4 text-xs font-mono text-slate-300 h-32 overflow-y-auto border-t border-slate-800">
                <div class="flex items-center gap-2 text-slate-500 mb-2 border-b border-slate-700 pb-1">
                    <i data-lucide="terminal" class="w-3 h-3"></i> PYTHON KERNEL
                </div>
                <div id="console-output" class="space-y-1">
                    <span class="text-green-500">>>> import pandas as pd</span><br>
                    <span class="text-green-500">>>> df = pd.read_csv('sales.csv')</span><br>
                    <span class="text-slate-400"># System Ready. Waiting for user input...</span>
                </div>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="flex-1 bg-slate-100 p-8 flex flex-col relative overflow-hidden">
            
            <!-- View Switcher Tabs -->
            <div class="flex gap-2 mb-0 ml-1">
                <button class="px-4 py-2 bg-white rounded-t-lg text-sm font-bold text-indigo-600 border-t border-l border-r border-slate-200 shadow-sm" id="tab-data">
                    <i data-lucide="database" class="inline w-4 h-4 mr-1"></i> Data Grid
                </button>
                <button class="px-4 py-2 bg-slate-200 rounded-t-lg text-sm font-bold text-slate-500 border-t border-l border-r border-slate-200" id="tab-viz">
                    <i data-lucide="pie-chart" class="inline w-4 h-4 mr-1"></i> Visualizer
                </button>
            </div>

            <!-- Content Area -->
            <div class="flex-1 bg-white rounded-b-lg rounded-tr-lg shadow-sm border border-slate-200 relative overflow-hidden">
                
                <!-- DATA TABLE VIEW -->
                <div id="view-table" class="absolute inset-0 flex flex-col">
                    <div class="p-3 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
                        <span class="text-xs font-mono text-slate-500">df.head(10)</span>
                        <div class="flex gap-2 text-xs">
                            <span class="flex items-center gap-1 text-slate-500"><div class="w-2 h-2 rounded-full bg-red-100 border border-red-300"></div> Duplicate Risk</span>
                        </div>
                    </div>
                    <div class="flex-1 overflow-auto">
                        <table class="w-full text-sm text-left">
                            <thead class="bg-slate-50 text-slate-500 font-medium sticky top-0 z-10 shadow-sm">
                                <tr id="table-header"></tr>
                            </thead>
                            <tbody id="table-body" class="divide-y divide-slate-100"></tbody>
                        </table>
                    </div>
                </div>

                <!-- CHART VIEW -->
                <div id="view-chart" class="absolute inset-0 hidden p-6 flex flex-col">
                    <div class="flex-1 relative">
                        <canvas id="mainChart"></canvas>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script>
        // --- DATA ---
        const rawData = [
            { Date: '2023-01-01', Product: 'Latte', Sales: 50, Revenue: 250, Shift_ID: 'A-101' },
            { Date: '2023-01-02', Product: 'Espresso', Sales: 30, Revenue: 90, Shift_ID: 'B-202' },
            { Date: '2023-01-01', Product: 'Latte', Sales: 50, Revenue: 250, Shift_ID: 'A-101' }, // Duplicate
            { Date: '2023-01-03', Product: 'Mocha', Sales: 40, Revenue: 200, Shift_ID: 'A-103' },
            { Date: '2023-01-04', Product: 'Tea', Sales: 20, Revenue: 60, Shift_ID: 'C-301' },
            { Date: '2023-01-04', Product: 'Tea', Sales: 20, Revenue: 60, Shift_ID: 'C-301' }, // Duplicate
            { Date: '2023-01-05', Product: 'Latte', Sales: 60, Revenue: 300, Shift_ID: 'B-205' },
        ];

        // --- STATE ---
        let currentStep = 0;
        let chartInstance = null;
        let dataset = [...rawData]; // Clone
        let activeCols = Object.keys(rawData[0]);
        let emailTimer = null;
        let dateConverted = false;

        // --- SCENARIOS ---
        const scenarios = [
            {
                id: 'clean',
                sender: "John Doe (CEO)",
                subject: "Subject: Weird numbers?",
                body: "Hey, transaction counts for Monday look inflated. Can you scrub the data log for errors before we run the analysis?",
                toolType: 'cleaning',
                correctAction: 'dedupe'
            },
            {
                id: 'select',
                sender: "Sarah (IT Dept)",
                subject: "Subject: Privacy Compliance",
                body: "Just a reminder: We shouldn't be using internal 'Shift_ID' codes in the executive reports. Please filter that column out of the dataset.",
                toolType: 'selection',
                targetCol: 'Shift_ID'
            },
            {
                id: 'dtypes',
                sender: "Sarah (IT Dept)",
                subject: "Subject: Sorting Issue",
                body: "I noticed the 'Date' column is stored as plain Text. This might mess up your timeline charts. Please **Convert to DateTime** objects.",
                toolType: 'cleaning',
                correctAction: 'dates'
            },
            {
                id: 'viz1',
                sender: "John Doe (CEO)",
                subject: "Subject: Growth Report",
                body: "Okay, data looks clean. I need to see our <strong>Revenue trend over Time</strong>. Are we growing or flatlining?",
                toolType: 'plotting',
                chartConfig: { type: 'line', x: 'Date', y: 'Revenue', label: 'Revenue ($)', color: '#4f46e5' }
            },
            {
                id: 'viz2',
                sender: "Marketing Director",
                subject: "Subject: Best Sellers",
                body: "We need to optimize our menu. Can you generate a chart comparing <strong>Total Sales by Product</strong>?",
                toolType: 'plotting',
                chartConfig: { type: 'bar', x: 'Product', y: 'Sales', label: 'Units Sold', color: '#d97706' }
            },
            {
                id: 'viz3',
                sender: "CFO",
                subject: "Subject: Revenue Mix",
                body: "I need a breakdown of our income sources. Show me the <strong>Revenue Share for each Product</strong> as a <strong>Pie Chart</strong>.",
                toolType: 'plotting',
                chartConfig: { type: 'pie', x: 'Product', y: 'Revenue', label: 'Revenue Share', color: '#10b981' }
            },
            {
                id: 'viz4',
                sender: "Marketing Director",
                subject: "Subject: Price Impact",
                body: "Last check: Do expensive drinks get better ratings? Create a <strong>Scatter Plot</strong> of Price vs Rating.",
                toolType: 'plotting',
                chartConfig: { type: 'scatter', x: 'Price', y: 'Rating', label: 'Reviews', color: '#db2777' }
            }
        ];

        // --- EMAIL SYSTEM ---
        function showEmail() {
            const el = document.getElementById('email-container');
            const btn = document.getElementById('show-email-btn');
            
            el.classList.remove('hidden', 'popup-exit');
            el.classList.add('popup-enter');
            btn.classList.add('hidden');
        }

        function hideEmail() {
            const el = document.getElementById('email-container');
            const btn = document.getElementById('show-email-btn');
            
            el.classList.remove('popup-enter');
            el.classList.add('popup-exit');
            
            // Wait for animation to finish before truly hiding
            setTimeout(() => {
                if(el.classList.contains('popup-exit')) { // Ensure we didn't reopen
                    el.classList.add('hidden');
                    btn.classList.remove('hidden');
                }
            }, 350);
        }

        function triggerEmail(s) {
            // Populate
            document.getElementById('email-sender').innerText = s.sender;
            document.getElementById('sender-avatar').innerText = s.sender.split(' ').map(n => n[0]).join('').substring(0,2);
            document.getElementById('email-body').innerHTML = `<strong>${s.subject}</strong><br><br>${s.body}`;
            
            // Show
            showEmail();
            
            // Auto Hide Timer
            if (emailTimer) clearTimeout(emailTimer);
            emailTimer = setTimeout(() => {
                hideEmail();
            }, 6000); // 6 Seconds read time
        }

        // --- INIT ---
        function loadStep() {
            const s = scenarios[currentStep];
            
            // Trigger Email
            triggerEmail(s);

            // Update UI Area
            const area = document.getElementById('controls-area');
            area.innerHTML = '';
            document.getElementById('feedback-msg').className = "hidden";

            if(s.toolType === 'cleaning') {
                switchTab('data');
                area.innerHTML = `
                    <p class="text-sm text-slate-600 mb-2">Select a Cleaning Tool:</p>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="attemptClean('nulls')" class="p-3 bg-white border border-slate-200 rounded-lg hover:border-indigo-400 text-left group transition-all">
                            <div class="text-xs font-bold text-slate-500 group-hover:text-indigo-600 mb-1">Fill Missing</div>
                            <i data-lucide="ghost" class="w-5 h-5 text-slate-400"></i>
                        </button>
                        <button onclick="attemptClean('dedupe')" class="p-3 bg-white border border-slate-200 rounded-lg hover:border-indigo-400 text-left group transition-all">
                            <div class="text-xs font-bold text-slate-500 group-hover:text-indigo-600 mb-1">Remove Dupes</div>
                            <i data-lucide="copy-minus" class="w-5 h-5 text-slate-400"></i>
                        </button>
                        <button onclick="attemptClean('dates')" class="p-3 bg-white border border-slate-200 rounded-lg hover:border-indigo-400 text-left group transition-all">
                            <div class="text-xs font-bold text-slate-500 group-hover:text-indigo-600 mb-1">Convert Dates</div>
                            <i data-lucide="calendar-clock" class="w-5 h-5 text-slate-400"></i>
                        </button>
                        <button onclick="attemptClean('outlier')" class="p-3 bg-white border border-slate-200 rounded-lg hover:border-indigo-400 text-left group transition-all">
                            <div class="text-xs font-bold text-slate-500 group-hover:text-indigo-600 mb-1">Filter Outliers</div>
                            <i data-lucide="filter" class="w-5 h-5 text-slate-400"></i>
                        </button>
                    </div>
                `;
            } else if (s.toolType === 'selection') {
                switchTab('data');
                area.innerHTML = `
                    <p class="text-sm text-slate-600 mb-2">Active Columns (Uncheck to Drop):</p>
                    <div class="space-y-2 bg-slate-50 p-3 rounded-lg border border-slate-200">
                        ${activeCols.map(col => `
                            <label class="flex items-center justify-between cursor-pointer p-2 hover:bg-white rounded border border-transparent hover:border-slate-200 transition-colors">
                                <span class="text-sm font-mono text-slate-700">${col}</span>
                                <input type="checkbox" checked onchange="toggleColumn('${col}')" class="accent-indigo-600 w-4 h-4">
                            </label>
                        `).join('')}
                    </div>
                    <button onclick="confirmSelection()" class="w-full bg-indigo-600 text-white py-2 rounded-lg font-bold hover:bg-indigo-700 mt-4">Apply Changes</button>
                `;
            } else if (s.toolType === 'plotting') {
                switchTab('viz');
                area.innerHTML = `
                    <p class="text-sm text-slate-600 mb-4">Chart Builder:</p>
                    <div class="space-y-3">
                        <div>
                            <label class="text-xs font-bold text-slate-400 uppercase">Chart Type</label>
                            <select id="viz-type" class="w-full bg-white border border-slate-300 rounded p-2 text-sm">
                                <option value="line">Line Chart</option>
                                <option value="bar">Bar Chart</option>
                                <option value="pie">Pie Chart</option>
                                <option value="scatter">Scatter Plot</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-xs font-bold text-slate-400 uppercase">X-Axis / Category</label>
                            <select id="viz-x" class="w-full bg-white border border-slate-300 rounded p-2 text-sm">
                                ${activeCols.map(c => `<option value="${c}">${c}</option>`).join('')}
                            </select>
                        </div>
                        <div>
                            <label class="text-xs font-bold text-slate-400 uppercase">Y-Axis / Value</label>
                            <select id="viz-y" class="w-full bg-white border border-slate-300 rounded p-2 text-sm">
                                ${activeCols.map(c => `<option value="${c}">${c}</option>`).join('')}
                            </select>
                        </div>
                        <button onclick="attemptPlot()" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 flex items-center justify-center gap-2">
                            <i data-lucide="play" class="w-4 h-4"></i> Generate
                        </button>
                    </div>
                `;
            }
            lucide.createIcons();
            renderTable();
        }

        // --- ACTIONS ---

        function attemptClean(tool) {
            const s = scenarios[currentStep];
            const feedback = document.getElementById('feedback-msg');
            
            if (tool === s.correctAction) {
                // Apply Fix
                if (tool === 'dedupe') {
                    const seen = new Set();
                    dataset = dataset.filter(row => {
                        const key = JSON.stringify(row);
                        return seen.has(key) ? false : seen.add(key);
                    });
                    logConsole(`df.drop_duplicates(inplace=True)`);
                    logConsole(`# Removed 2 duplicate rows.`);
                } else if (tool === 'dates') {
                    dateConverted = true;
                    logConsole(`df['Date'] = pd.to_datetime(df['Date'])`);
                    logConsole(`# Dates converted to Timestamp objects.`);
                }
                
                renderTable();
                
                feedback.className = "mt-4 p-3 rounded-lg text-sm font-medium bg-green-100 text-green-700 border border-green-200";
                feedback.innerHTML = `<div class="flex items-center gap-2"><i data-lucide="check-circle" class="w-4 h-4"></i> Success! Proceeding...</div>`;
                feedback.classList.remove('hidden');
                
                setTimeout(() => { currentStep++; loadStep(); }, 1500);
            } else {
                feedback.className = "mt-4 p-3 rounded-lg text-sm font-medium bg-red-100 text-red-700 border border-red-200";
                feedback.innerHTML = "Analysis: No issues found with this tool. Look closely at the data or request.";
                feedback.classList.remove('hidden');
            }
            lucide.createIcons();
        }

        let pendingDrop = null;
        function toggleColumn(col) {
            pendingDrop = col; 
        }

        function confirmSelection() {
            const s = scenarios[currentStep];
            const feedback = document.getElementById('feedback-msg');

            if (pendingDrop === s.targetCol) {
                activeCols = activeCols.filter(c => c !== pendingDrop);
                logConsole(`df.drop(columns=['${pendingDrop}'], inplace=True)`);
                renderTable();
                
                feedback.className = "mt-4 p-3 rounded-lg text-sm font-medium bg-green-100 text-green-700 border border-green-200";
                feedback.innerHTML = "Column Dropped. Proceeding...";
                feedback.classList.remove('hidden');
                setTimeout(() => { currentStep++; loadStep(); }, 1500);
            } else {
                feedback.className = "mt-4 p-3 rounded-lg text-sm font-medium bg-red-100 text-red-700 border border-red-200";
                feedback.innerHTML = "Incorrect. Check the email request again.";
                feedback.classList.remove('hidden');
            }
        }

        function attemptPlot() {
            const s = scenarios[currentStep];
            const type = document.getElementById('viz-type').value;
            const x = document.getElementById('viz-x').value;
            const y = document.getElementById('viz-y').value;
            const feedback = document.getElementById('feedback-msg');

            renderChart(type, x, y, s.chartConfig.color, s.chartConfig.label);

            if (type === s.chartConfig.type && x === s.chartConfig.x && y === s.chartConfig.y) {
                logConsole(`sns.${type}plot(data=df, x='${x}', y='${y}')`);
                feedback.className = "mt-4 p-3 rounded-lg text-sm font-medium bg-green-100 text-green-700 border border-green-200";
                feedback.innerHTML = "Perfect Match! Sending to CEO...";
                feedback.classList.remove('hidden');
                
                if (currentStep < scenarios.length - 1) {
                    setTimeout(() => { currentStep++; loadStep(); }, 2000);
                } else {
                    setTimeout(() => alert("All Tasks Complete! Great job."), 1000);
                }
            } else {
                feedback.className = "mt-4 p-3 rounded-lg text-sm font-medium bg-amber-100 text-amber-800 border border-amber-200";
                feedback.innerHTML = "Chart rendered, but doesn't answer the specific question. Try again.";
                feedback.classList.remove('hidden');
            }
        }

        // --- UTILS ---

        function renderTable() {
            const thead = document.getElementById('table-header');
            const tbody = document.getElementById('table-body');
            
            thead.innerHTML = activeCols.map(c => {
                let style = "text-slate-500";
                let icon = "";
                if(c === 'Date' && dateConverted) {
                    style = "text-indigo-600";
                    icon = `<i data-lucide="calendar" class="w-3 h-3 inline mr-1"></i>`;
                }
                return `<th class="px-4 py-3 bg-slate-50 text-xs font-bold ${style} uppercase tracking-wider border-b border-slate-200">${icon}${c}</th>`
            }).join('');

            const isDirty = dataset.length === 7;

            tbody.innerHTML = dataset.map((row, i) => {
                const isDupe = isDirty && (i === 2 || i === 5);
                return `
                    <tr class="bg-white border-b border-slate-50 hover:bg-slate-50 transition-colors ${isDupe ? 'highlight-row' : ''}">
                        ${activeCols.map(c => `
                            <td class="px-4 py-3 text-slate-700 ${isDupe ? 'text-red-500 font-bold' : ''}">${row[c]}</td>
                        `).join('')}
                    </tr>
                `;
            }).join('');
            lucide.createIcons();
        }

        function renderChart(type, xKey, yKey, color, label) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if(chartInstance) chartInstance.destroy();

            let labels, data;
            
            if ((type === 'bar' || type === 'pie') && xKey === 'Product') {
                // Simplified aggregation for demo
                const agg = { 'Latte': 110, 'Espresso': 30, 'Mocha': 40, 'Tea': 40 };
                // Adjust if using Revenue for Pie Chart
                if (yKey === 'Revenue') {
                    // Approximate revenue sums
                    agg['Latte'] = 550; agg['Espresso'] = 90; agg['Mocha'] = 200; agg['Tea'] = 120;
                }
                labels = Object.keys(agg);
                data = Object.values(agg);
            } else {
                labels = dataset.map(d => d[xKey]);
                data = dataset.map(d => d[yKey]);
            }

            const bgColors = type === 'pie' 
                ? ['#6366f1', '#ec4899', '#f59e0b', '#10b981'] 
                : (color || '#6366f1');

            chartInstance = new Chart(ctx, {
                type: type,
                data: {
                    labels: labels,
                    datasets: [{
                        label: label || yKey,
                        data: data,
                        backgroundColor: bgColors,
                        borderColor: color || '#6366f1',
                        borderWidth: type === 'pie' ? 0 : 2,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'top' } }
                }
            });
        }

        function switchTab(tab) {
            const tData = document.getElementById('tab-data');
            const tViz = document.getElementById('tab-viz');
            const vTable = document.getElementById('view-table');
            const vChart = document.getElementById('view-chart');

            if(tab === 'data') {
                tData.className = "px-4 py-2 bg-white rounded-t-lg text-sm font-bold text-indigo-600 border-t border-l border-r border-slate-200 shadow-sm";
                tViz.className = "px-4 py-2 bg-slate-200 rounded-t-lg text-sm font-bold text-slate-500 border-t border-l border-r border-slate-200";
                vTable.classList.remove('hidden');
                vChart.classList.add('hidden');
            } else {
                tViz.className = "px-4 py-2 bg-white rounded-t-lg text-sm font-bold text-indigo-600 border-t border-l border-r border-slate-200 shadow-sm";
                tData.className = "px-4 py-2 bg-slate-200 rounded-t-lg text-sm font-bold text-slate-500 border-t border-l border-r border-slate-200";
                vChart.classList.remove('hidden');
                vTable.classList.add('hidden');
            }
        }

        function logConsole(text) {
            const c = document.getElementById('console-output');
            c.innerHTML += `<br><span class="text-white">>>> ${text}</span>`;
            c.parentElement.scrollTop = c.parentElement.scrollHeight;
        }

        loadStep();
        
        document.getElementById('tab-data').onclick = () => switchTab('data');
        document.getElementById('tab-viz').onclick = () => switchTab('viz');

    </script>
</body>
</html>
